<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#100d0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Slovíčka EN">
<title>Slovíčka EN — výuka angličtiny</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#100d0b; --surface:#191412; --surface-2:#211a16;
    --ink:#e6d9c8; --ink-soft:#a1937f; --ink-faint:#6b6053;
    --accent:#bd824a; --accent-ink:#160f08;
    --c-learn:#d3614a; --c-almost:#dd8f33; --c-known:#9aa658; --c-done:#c08a52;
    --line:#2e2823;
    --radius:18px;
    --shadow:0 10px 30px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(120% 80% at 50% -10%, #1c1612 0%, var(--bg) 55%);
    color:var(--ink);
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    min-height:100dvh;
    padding-bottom:env(safe-area-inset-bottom);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 18px 110px;}
  header{
    padding:26px 18px 14px;max-width:560px;margin:0 auto;
    display:flex;align-items:baseline;justify-content:space-between;gap:12px;
  }
  header h1{
    font-family:'Fraunces',serif;font-weight:600;font-size:26px;letter-spacing:-.5px;
    margin:0;line-height:1;
  }
  header h1 span{color:var(--accent);font-style:italic;}
  .tag{font-size:12px;color:var(--ink-faint);letter-spacing:.5px;text-transform:uppercase;}

  /* Cards / panels */
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
  label.fld{display:block;font-size:12px;color:var(--ink-soft);margin:0 0 6px 2px;letter-spacing:.3px;}
  textarea,input[type=text]{
    width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--ink);
    border-radius:12px;padding:13px 14px;font-size:17px;font-family:inherit;resize:none;outline:none;
  }
  textarea:focus,input:focus{border-color:var(--accent);}
  textarea{min-height:72px;}

  .dir{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .dir button{
    flex:1;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-soft);
    padding:9px;border-radius:11px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;
  }
  .dir .swap{flex:0 0 auto;width:42px;font-size:18px;color:var(--accent);background:transparent;border:none;}
  .dir button.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:var(--accent);color:var(--accent-ink);border:none;border-radius:13px;
    padding:14px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px;
  }
  .btn:active{transform:translateY(1px);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn:disabled{opacity:.5;}

  .result{margin-top:14px;}
  .result .out{
    background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:14px;
    font-size:19px;min-height:52px;line-height:1.4;
  }
  .result .out.empty{color:var(--ink-faint);font-style:italic;font-size:15px;}

  /* Word list */
  .listhead{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 12px;}
  .listhead h2{font-family:'Fraunces',serif;font-weight:600;font-size:21px;margin:0;}
  .stats{display:flex;gap:8px;margin-bottom:14px;}
  .stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px;text-align:center;}
  .stat b{display:block;font-family:'Fraunces',serif;font-size:24px;line-height:1;}
  .stat small{font-size:11px;color:var(--ink-soft);letter-spacing:.3px;}
  .s-learn b{color:var(--c-learn);} .s-almost b{color:var(--c-almost);} .s-known b{color:var(--c-known);} .s-done b{color:var(--c-done);}

  .item{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px;
    display:flex;align-items:center;gap:12px;margin-bottom:9px;
  }
  .item .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .item .txt{flex:1;min-width:0;}
  .item .en{font-size:16px;font-weight:600;}
  .item .cs{font-size:14px;color:var(--ink-soft);}
  .item .del{background:transparent;border:none;color:var(--ink-faint);font-size:19px;cursor:pointer;padding:4px 6px;}
  .empty-note{text-align:center;color:var(--ink-faint);padding:40px 10px;font-size:15px;line-height:1.5;}

  /* Flashcards */
  .flash{
    background:var(--surface);border:1px solid var(--line);border-radius:22px;
    min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:28px 22px;text-align:center;cursor:pointer;position:relative;box-shadow:var(--shadow);
  }
  .flash .side-label{position:absolute;top:14px;left:0;right:0;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint);}
  .flash .word{font-family:'Fraunces',serif;font-size:34px;font-weight:600;line-height:1.15;letter-spacing:-.5px;}
  .flash .word.anim{animation:cardin .22s ease;}
  @keyframes cardin{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:none;}}
  .streak{display:flex;justify-content:center;margin-bottom:12px;}
  .streak span{background:var(--surface);border:1px solid var(--line);border-radius:30px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--ink-soft);}
  .streak b{color:var(--accent);}
  .flash .hint{margin-top:16px;font-size:13px;color:var(--ink-faint);}
  .flash .badge{position:absolute;top:14px;right:16px;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700;}

  .examples{margin-top:14px;}
  .examples h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);margin:0 0 8px 2px;}
  .ex{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:15px;line-height:1.45;}
  .ex em{color:var(--accent);font-style:normal;font-weight:600;}
  .ex .tr{display:block;color:var(--ink-soft);font-size:13px;margin-top:3px;}
  .ex-loading{color:var(--ink-faint);font-size:14px;font-style:italic;padding:6px 2px;}

  .rate{display:flex;gap:8px;margin-top:16px;}
  .rate button{flex:1;border:none;border-radius:13px;padding:14px 6px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;color:#fff;display:flex;flex-direction:column;gap:3px;align-items:center;}
  .rate small{font-weight:500;opacity:.85;font-size:11px;}
  .r-learn{background:var(--c-learn);} .r-almost{background:var(--c-almost);color:#2a1c00;} .r-known{background:var(--c-known);}

  .progress{text-align:center;color:var(--ink-soft);font-size:13px;margin-bottom:14px;}

  /* Bottom nav */
  nav{
    position:fixed;bottom:0;left:0;right:0;background:rgba(20,17,15,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom));
    z-index:10;
  }
  nav button{
    flex:1;background:transparent;border:none;color:var(--ink-faint);font-family:inherit;
    font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;
  }
  nav button .ic{font-size:21px;line-height:1;}
  nav button.on{color:var(--accent);}

  .hidden{display:none !important;}
  .toast{
    position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--bg);padding:11px 20px;border-radius:30px;font-weight:600;font-size:14px;
    opacity:0;transition:.25s;pointer-events:none;z-index:20;box-shadow:var(--shadow);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.25);border-top-color:var(--accent-ink);border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<header>
  <h1>Slov<span>í</span>čka EN</h1>
  <span class="tag">EN · CS · v8</span>
</header>

<div class="wrap">

  <!-- ============ TRANSLATOR ============ -->
  <section id="view-translate">
    <div class="panel">
      <div class="dir">
        <button id="dirA" class="on" onclick="setDir('cs','en')">Čeština</button>
        <button class="swap" onclick="swapDir()">⇄</button>
        <button id="dirB" onclick="setDir('en','cs')">Angličtina</button>
      </div>
      <label class="fld" id="srcLabel">Zadej text v češtině</label>
      <textarea id="src" placeholder="napiš slovíčko nebo frázi…"></textarea>
      <button class="btn" id="goBtn" onclick="translateNow()">Přeložit</button>
      <div class="result">
        <label class="fld" id="outLabel">Překlad</label>
        <div class="out empty" id="out">Sem se zobrazí překlad…</div>
        <button class="btn ghost" id="saveBtn" onclick="saveCurrent()" disabled>＋ Uložit k učení</button>
      </div>
    </div>
  </section>

  <!-- ============ WORD LIST ============ -->
  <section id="view-list" class="hidden">
    <div id="backupBanner" class="hidden" style="background:var(--surface-2);border:1px solid var(--accent);border-radius:12px;padding:11px 13px;margin-bottom:14px;display:flex;align-items:center;gap:10px;">
      <span style="flex:1;font-size:14px;line-height:1.35;">Máš nezálohované změny.</span>
      <button class="btn" style="margin:0;width:auto;padding:9px 15px;font-size:14px;" onclick="exportWords()">Zálohovat</button>
    </div>
    <div class="stats">
      <div class="stat s-learn"><b id="stLearn">0</b><small>učím se</small></div>
      <div class="stat s-almost"><b id="stAlmost">0</b><small>skoro</small></div>
      <div class="stat s-known"><b id="stKnown">0</b><small>umím</small></div>
      <div class="stat s-done"><b id="stDone">0</b><small>naučeno</small></div>
    </div>
    <div style="display:flex;gap:8px;margin:0 0 14px;">
      <button class="btn ghost" style="margin:0;font-size:14px;padding:11px;flex:1;" onclick="exportWords()">⬇ Záloha</button>
      <button class="btn ghost" style="margin:0;font-size:14px;padding:11px;flex:1;" onclick="document.getElementById('syncFile').click()">🔄 Sync</button>
      <input type="file" id="syncFile" accept="application/json,.json" style="display:none" onchange="syncWords(event)">
    </div>
    <div class="listhead">
      <h2>Moje slovíčka</h2>
      <span class="tag" id="totalCount">0</span>
    </div>
    <div id="wordList"></div>
  </section>

  <!-- ============ LEARNING ============ -->
  <section id="view-learn" class="hidden">
    <div id="learnEmpty" class="empty-note hidden">
      Zatím nemáš co se učit.<br>Přidej si slovíčka v překladači.
    </div>
    <div id="learnNothingDue" class="empty-note hidden">
      Hotovo, nic teď není na řadě. 👍<br>
      <span id="nextDueText" style="display:block;margin-top:8px;font-size:14px;"></span>
      <button class="btn ghost" style="max-width:260px;margin:18px auto 0;" onclick="startLearn(true)">Procvičit vše stejně</button>
    </div>
    <div id="learnArea" class="hidden">
      <div class="streak" id="streakChip"></div>
      <div class="dir" id="learnDirRow" style="margin-bottom:14px;">
        <button id="ldA" class="on" onclick="setLearnDir('en')">Anglicky → Česky</button>
        <button id="ldB" onclick="setLearnDir('cs')">Česky → Anglicky</button>
      </div>
      <div class="progress" id="learnProgress"></div>
      <div class="flash" id="flash" onclick="flipCard()">
        <span class="badge" id="cardBadge"></span>
        <span class="side-label" id="cardSide"></span>
        <span class="word" id="cardWord"></span>
        <span class="hint" id="cardHint">ťukni pro otočení</span>
      </div>
      <div id="exampleBox" class="examples hidden">
        <h3>Fráze s tímto slovem</h3>
        <div id="examples"></div>
      </div>
      <div class="rate hidden" id="rateRow">
        <button class="r-learn" onclick="rate(1)">Neumím<small>učím se</small></button>
        <button class="r-almost" onclick="rate(2)">Skoro<small>skoro</small></button>
        <button class="r-known" onclick="rate(3)">Umím<small>hotovo</small></button>
      </div>
      <button class="btn ghost hidden" id="retireBtn" style="margin-top:8px;font-size:14px;padding:11px;" onclick="rate(4)">✓ Naučeno – už nenabízet</button>
    </div>
    <div id="learnDone" class="empty-note hidden">
      <div id="doneMsg">Hotovo! 🎉</div>
      <button class="btn ghost" style="max-width:260px;margin:18px auto 0;" onclick="startLearn(true)">Procvičit vše znovu</button>
    </div>
  </section>

</div>

<nav>
  <button id="nav-translate" class="on" onclick="show('translate')"><span class="ic">⇆</span>Překladač</button>
  <button id="nav-list" onclick="show('list')"><span class="ic">☰</span>Slovíčka</button>
  <button id="nav-learn" onclick="show('learn')"><span class="ic">◧</span>Učení</button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* ---------- Storage ---------- */
const KEY='slovicka_v1';
let words=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(words));localStorage.setItem(KEY+'_changed',String(Date.now()));updateBackupBanner();}
function updateBackupBanner(){
  const b=document.getElementById('backupBanner');if(!b)return;
  const changed=+(localStorage.getItem(KEY+'_changed')||0);
  const backup=+(localStorage.getItem(KEY+'_backup')||0);
  b.classList.toggle('hidden', !(words.length>0 && changed>backup));
}

/* ---------- Toast ---------- */
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1800);}

/* ---------- Direction ---------- */
let from='cs',to='en';
const LANGNAME={cs:'češtině',en:'angličtině'};
function setDir(f,t){from=f;to=t;document.getElementById('dirA').classList.toggle('on',f==='cs');document.getElementById('dirB').classList.toggle('on',f==='en');refreshLabels();}
function swapDir(){setDir(to,from);const s=document.getElementById('src');s.value=current?current.target:s.value;}
function refreshLabels(){
  document.getElementById('srcLabel').textContent='Zadej text v '+LANGNAME[from];
  document.getElementById('outLabel').textContent='Překlad do '+LANGNAME[to];
}

/* ---------- Translate engine: Google Translate (free gtx) only ---------- */
let current=null; // {source,target,from,to}

// Remove diacritics + lowercase, for comparing "same word"
function stripDia(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();}

// Shared helper: returns {text, corrected}. Google Translate only.
// Uses sl=auto so Google also returns its spell/diacritics suggestion (d[7]),
// `corrected` = source rewritten with proper diacritics (may be empty).
async function translateText(text,src,tgt){
  const u='https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl='+tgt+'&dt=t&q='+encodeURIComponent(text);
  const r=await fetch(u);
  if(!r.ok) throw new Error('http '+r.status);
  const d=await r.json();
  let out='';
  if(Array.isArray(d)&&Array.isArray(d[0])){
    out=d[0].map(seg=>seg&&seg[0]?seg[0]:'').join('').trim();
  }
  let corrected='';
  if(Array.isArray(d[7]) && d[7][0]){
    corrected=String(d[7][0]).replace(/<[^>]+>/g,'').trim(); // strip <b><i> markup → corrected text
  }
  return {text:out, corrected}; // note: out may be empty if only a correction was offered
}

async function translateNow(){
  let text=document.getElementById('src').value.trim();
  if(!text){toast('Napiš nejdřív text');return;}
  const btn=document.getElementById('goBtn');
  const out=document.getElementById('out');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Překládám…';
  out.classList.add('empty');out.textContent='…';
  try{
    let res=await translateText(text,from,to);
    // From Czech: if Google suggests the SAME word with diacritics (e.g. lizat→lízat),
    // adopt the corrected form and translate THAT (the raw form may not translate well).
    if(from==='cs' && res.corrected && res.corrected!==text && stripDia(res.corrected)===stripDia(text)){
      text=res.corrected;
      document.getElementById('src').value=text;
      toast('Doplněna diakritika');
      res=await translateText(text,from,to);
    }
    if(!res.text) throw new Error('no result');
    out.classList.remove('empty');
    out.textContent=res.text;
    current={source:text,target:res.text,from,to};
    document.getElementById('saveBtn').disabled=false;
  }catch(e){
    out.classList.add('empty');
    out.textContent='Překlad se nepovedl (zkontroluj připojení).';
    current=null;document.getElementById('saveBtn').disabled=true;
  }finally{
    btn.disabled=false;btn.textContent='Přeložit';
  }
}

/* ---------- Save word ---------- */
function saveCurrent(){
  if(!current)return;
  // store always as EN<->CS pair regardless of direction
  let en,cs;
  if(current.from==='en'){en=current.source;cs=current.target;}
  else{en=current.target;cs=current.source;}
  en=en.trim();cs=cs.trim();
  if(words.some(w=>w.en.toLowerCase()===en.toLowerCase())){toast('Už uloženo');return;}
  words.unshift({id:Date.now(),en,cs,box:1,added:Date.now(),due:Date.now()});
  save();renderList();
  toast('Uloženo ✓');
}

/* ---------- Word list ---------- */
const BOXNAME={1:'učím se',2:'skoro',3:'umím',4:'naučeno'};
const BOXVAR={1:'var(--c-learn)',2:'var(--c-almost)',3:'var(--c-known)',4:'var(--c-done)'};
function renderList(){
  const c={1:0,2:0,3:0,4:0};words.forEach(w=>c[w.box]=(c[w.box]||0)+1);
  document.getElementById('stLearn').textContent=c[1];
  document.getElementById('stAlmost').textContent=c[2];
  document.getElementById('stKnown').textContent=c[3];
  document.getElementById('stDone').textContent=c[4];
  document.getElementById('totalCount').textContent=words.length;
  const list=document.getElementById('wordList');
  if(!words.length){list.innerHTML='<div class="empty-note">Žádná slovíčka.<br>Přelož něco a ulož si to.</div>';return;}
  list.innerHTML=words.map(w=>`
    <div class="item">
      <span class="dot" style="background:${BOXVAR[w.box]}"></span>
      <div class="txt">
        <div class="en">${esc(w.en)}</div>
        <div class="cs">${esc(w.cs)}</div>
      </div>
      <button class="del" onclick="delWord(${w.id})">✕</button>
    </div>`).join('');
}
function delWord(id){words=words.filter(w=>w.id!==id);save();renderList();}
function esc(s){return s.replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

/* ---------- Backup: export (with location chooser) + two-way Sync ---------- */
function markBackupDone(){
  localStorage.setItem(KEY+'_backup',String(Date.now()));
  updateBackupBanner();
}
async function exportWords(){
  if(!words.length){toast('Nejsou žádná slovíčka');return;}
  const fname='slovicka-zaloha-'+new Date().toISOString().slice(0,10)+'.json';
  const json=JSON.stringify(words,null,2);
  // Preferred on phones: system share/save sheet → choose Google Disk, Soubory, …
  try{
    const file=new File([json],fname,{type:'application/json'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:fname});
      markBackupDone();
      toast('Záloha uložena');
      return;
    }
  }catch(e){
    if(e && e.name==='AbortError') return; // user closed the sheet
    // any other error → fall back to a normal download
  }
  // Fallback (e.g. desktop): download into Stažené
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=fname;
  document.body.appendChild(a);a.click();a.remove();
  URL.revokeObjectURL(url);
  markBackupDone();
  toast('Záloha stažena');
}
// Two-way merge: union of file + app; for the same word the newer progress wins.
function mergeWords(incoming){
  const keyOf=w=>String(w.en).toLowerCase();
  const map=new Map();
  words.forEach(w=>map.set(keyOf(w),w));
  let added=0;
  incoming.forEach(it=>{
    if(!it||!it.en||!it.cs)return;
    const norm={
      id: it.id||(Date.now()+Math.floor(Math.random()*100000)),
      en:String(it.en), cs:String(it.cs),
      box:[1,2,3].includes(it.box)?it.box:1,
      added:it.added||Date.now(),
      due:it.due||Date.now(),
      lastReviewed:it.lastReviewed||null
    };
    const k=keyOf(norm);
    if(!map.has(k)){map.set(k,norm);added++;}
    else{
      const cur=map.get(k);
      if((norm.lastReviewed||0) > (cur.lastReviewed||0)){ // incoming reviewed more recently
        map.set(k,{...norm, id:cur.id, added:Math.min(cur.added||norm.added, norm.added||cur.added)});
      }
    }
  });
  words=[...map.values()].sort((a,b)=>(b.added||0)-(a.added||0));
  return added;
}
function syncWords(ev){
  const file=ev.target.files&&ev.target.files[0];
  ev.target.value='';
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(){
    try{
      const arr=JSON.parse(reader.result);
      if(!Array.isArray(arr)) throw new Error('bad');
      const added=mergeWords(arr);
      save();renderList(); // marks changes pending → banner will prompt for Záloha
      toast('Sloučeno: +'+added+' nových, celkem '+words.length+'. Dej Zálohu.');
    }catch(e){
      toast('Soubor se nepodařilo načíst');
    }
  };
  reader.readAsText(file);
}

/* ---------- Learning (Leitner spaced repetition) ---------- */
// Days until a word is offered again, by category after rating.
const INTERVAL_DAYS={1:1,2:3,3:7};
const DAY_MS=86400000;
let queue=[],qi=0,flipped=false,learnDir='en',reviewedThisSession=0; // 'en' = EN→CS, 'cs' = CS→EN
/* --- Streak (consecutive study days) --- */
function todayStr(){return new Date(Date.now()-new Date().getTimezoneOffset()*60000).toISOString().slice(0,10);}
function yesterdayStr(){return new Date(Date.now()-DAY_MS-new Date().getTimezoneOffset()*60000).toISOString().slice(0,10);}
function getStreak(){
  const last=localStorage.getItem(KEY+'_lastday');
  const streak=+(localStorage.getItem(KEY+'_streak')||0);
  if(!last) return 0;
  if(last===todayStr()||last===yesterdayStr()) return streak; // still alive
  return 0; // broken
}
function bumpStreak(){ // call when the user actually reviews a card
  const today=todayStr();
  const last=localStorage.getItem(KEY+'_lastday');
  let streak=+(localStorage.getItem(KEY+'_streak')||0);
  if(last!==today){
    streak = (last===yesterdayStr()) ? streak+1 : 1;
    localStorage.setItem(KEY+'_streak',String(streak));
    localStorage.setItem(KEY+'_lastday',today);
  }
}
function renderStreak(){
  const el=document.getElementById('streakChip');if(!el)return;
  const s=getStreak();
  el.innerHTML = s>0 ? ('<span>🔥 <b>'+s+'</b> '+pl(s,'den','dny','dní')+' v kuse</span>')
                     : '<span>🔥 Začni dnes sérii!</span>';
}
function animWord(){const el=document.getElementById('cardWord');el.classList.remove('anim');void el.offsetWidth;el.classList.add('anim');}
function pl(n,one,few,many){return n===1?one:(n>=2&&n<=4?few:many);}
function updateNextDueInfo(){
  const now=Date.now();
  let next=Infinity;
  words.forEach(w=>{if(w.box===4)return;const d=w.due||0; if(d>now && d<next) next=d;});
  const el=document.getElementById('nextDueText');
  if(next===Infinity){el.textContent='Až přidáš nová slovíčka, objeví se tu.';return;}
  const hours=Math.ceil((next-now)/3600000);
  const txt = hours<24 ? ('za '+hours+' '+pl(hours,'hodinu','hodiny','hodin'))
                       : ('za '+Math.ceil(hours/24)+' '+pl(Math.ceil(hours/24),'den','dny','dní'));
  el.textContent='Další slovíčko bude na řadě '+txt+'.';
}
function frontSide(w){return learnDir==='cs'?{label:'Česky',word:w.cs}:{label:'Anglicky',word:w.en};}
function backSide(w){return learnDir==='cs'?{label:'Anglicky',word:w.en}:{label:'Česky',word:w.cs};}
function setLearnDir(d){
  learnDir=d;
  document.getElementById('ldA').classList.toggle('on',d==='en');
  document.getElementById('ldB').classList.toggle('on',d==='cs');
  if(queue.length && qi<queue.length) showCard(); // restart current card from its front side
}
function startLearn(forceAll){
  const now=Date.now();
  reviewedThisSession=0;
  renderStreak();
  // Normal review skips "naučeno" (box 4). "Procvičit vše" includes everything.
  const pool = forceAll ? [...words] : words.filter(w=>w.box!==4 && (!w.due || w.due<=now));
  // Order: weaker categories first, then most overdue first, then random.
  queue = pool.sort((a,b)=> a.box-b.box || (a.due||0)-(b.due||0) || Math.random()-0.5);
  qi=0;
  const noWords = words.length===0;
  const nothingDue = !noWords && queue.length===0;
  document.getElementById('learnEmpty').classList.toggle('hidden', !noWords);
  document.getElementById('learnNothingDue').classList.toggle('hidden', !nothingDue);
  document.getElementById('learnArea').classList.toggle('hidden', queue.length===0);
  document.getElementById('learnDone').classList.add('hidden');
  if(nothingDue) updateNextDueInfo();
  if(queue.length) showCard();
}
function showCard(){
  if(qi>=queue.length){finishLearn();return;}
  flipped=false;
  const w=queue[qi];
  const front=frontSide(w);
  document.getElementById('learnProgress').textContent=`Kartička ${qi+1} z ${queue.length}`;
  document.getElementById('cardSide').textContent=front.label;
  document.getElementById('cardWord').textContent=front.word;
  animWord();
  document.getElementById('cardHint').classList.remove('hidden');
  const badge=document.getElementById('cardBadge');
  badge.textContent=BOXNAME[w.box];badge.style.background=BOXVAR[w.box];
  badge.style.color=w.box===2?'#2a1c00':'#f0e6d8';
  document.getElementById('rateRow').classList.add('hidden');
  document.getElementById('retireBtn').classList.add('hidden');
  document.getElementById('exampleBox').classList.add('hidden');
  document.getElementById('examples').innerHTML='';
}
function flipCard(){
  if(qi>=queue.length)return;
  const w=queue[qi];
  if(!flipped){
    flipped=true;
    const back=backSide(w);
    document.getElementById('cardSide').textContent=back.label;
    document.getElementById('cardWord').textContent=back.word;
    animWord();
    document.getElementById('cardHint').classList.add('hidden');
    document.getElementById('rateRow').classList.remove('hidden');
    document.getElementById('retireBtn').classList.remove('hidden');
    loadExamples(w.en);
  }else{
    const front=frontSide(w);
    document.getElementById('cardSide').textContent=front.label;
    document.getElementById('cardWord').textContent=front.word;
    animWord();
    flipped=false;
  }
}
function rate(box){
  const w=queue[qi];
  const real=words.find(x=>x.id===w.id);
  if(real){
    real.box=box;
    real.lastReviewed=Date.now();
    // box 4 = naučeno (retired): not scheduled. Others get next due date.
    real.due = box===4 ? (Date.now()+3650*DAY_MS) : (Date.now()+INTERVAL_DAYS[box]*DAY_MS);
  }
  reviewedThisSession++;
  bumpStreak();
  save();
  qi++;showCard();
}
function finishLearn(){
  document.getElementById('learnArea').classList.add('hidden');
  document.getElementById('learnDone').classList.remove('hidden');
  const n=reviewedThisSession, s=getStreak();
  let msg='Hotovo! 🎉<br>Prošel jsi '+n+' '+pl(n,'kartičku','kartičky','kartiček')+'.';
  if(s>0) msg+='<br>🔥 Série: '+s+' '+pl(s,'den','dny','dní')+' v kuse.';
  document.getElementById('doneMsg').innerHTML=msg;
  renderList();
}

/* ---------- Example phrases (Free Dictionary API for EN words) ---------- */
async function loadExamples(word){
  const box=document.getElementById('exampleBox');
  const cont=document.getElementById('examples');
  box.classList.remove('hidden');
  cont.innerHTML='<div class="ex-loading">Hledám fráze…</div>';
  const single=word.trim().split(/\s+/).length===1;
  try{
    if(!single)throw new Error('phrase');
    const r=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word.toLowerCase()));
    if(!r.ok)throw new Error('not found');
    const d=await r.json();
    const ex=[];
    d.forEach(entry=>(entry.meanings||[]).forEach(m=>(m.definitions||[]).forEach(def=>{
      if(def.example) ex.push(def.example);
    })));
    const uniq=[...new Set(ex)].slice(0,4);
    if(!uniq.length)throw new Error('no examples');
    // translate each example to CS
    cont.innerHTML='';
    for(const sentence of uniq){
      const id='ex'+Math.random().toString(36).slice(2);
      const hl=esc(sentence).replace(new RegExp('('+word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<em>$1</em>');
      cont.innerHTML+=`<div class="ex">${hl}<span class="tr" id="${id}">…</span></div>`;
      translateExample(sentence,id);
    }
  }catch(e){
    cont.innerHTML='<div class="ex-loading">Pro toto slovo se nenašly ukázkové fráze.</div>';
  }
}
async function translateExample(sentence,id){
  try{
    const res=await translateText(sentence,'en','cs');
    const el=document.getElementById(id);if(el)el.textContent=res.text||'';
  }catch(e){const el=document.getElementById(id);if(el)el.textContent='';}
}

/* ---------- View switching ---------- */
function show(v){
  ['translate','list','learn'].forEach(x=>{
    document.getElementById('view-'+x).classList.toggle('hidden',x!==v);
    document.getElementById('nav-'+x).classList.toggle('on',x===v);
  });
  if(v==='list')renderList();
  if(v==='learn')startLearn();
}

/* ---------- init ---------- */
if(navigator.storage && navigator.storage.persist){ navigator.storage.persist().catch(()=>{}); }
refreshLabels();renderList();updateBackupBanner();
document.getElementById('src').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();translateNow();}});
