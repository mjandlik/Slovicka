<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#14110f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Slovíčka EN">
<title>Slovíčka EN — výuka angličtiny</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14110f; --surface:#1f1b18; --surface-2:#2a2521;
    --ink:#f0e9e0; --ink-soft:#b6ada1; --ink-faint:#7d756b;
    --accent:#f0a830; --accent-ink:#1a1510;
    --c-learn:#e5705a; --c-almost:#f0a830; --c-known:#79b56e;
    --line:#34302b;
    --radius:18px;
    --shadow:0 10px 30px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(120% 80% at 50% -10%, #221c17 0%, var(--bg) 60%);
    color:var(--ink);
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    min-height:100dvh;
    padding-bottom:env(safe-area-inset-bottom);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 18px 110px;}
  header{
    padding:26px 18px 14px;max-width:560px;margin:0 auto;
    display:flex;align-items:baseline;justify-content:space-between;gap:12px;
  }
  header h1{
    font-family:'Fraunces',serif;font-weight:600;font-size:26px;letter-spacing:-.5px;
    margin:0;line-height:1;
  }
  header h1 span{color:var(--accent);font-style:italic;}
  .tag{font-size:12px;color:var(--ink-faint);letter-spacing:.5px;text-transform:uppercase;}

  /* Cards / panels */
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
  label.fld{display:block;font-size:12px;color:var(--ink-soft);margin:0 0 6px 2px;letter-spacing:.3px;}
  textarea,input[type=text]{
    width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--ink);
    border-radius:12px;padding:13px 14px;font-size:17px;font-family:inherit;resize:none;outline:none;
  }
  textarea:focus,input:focus{border-color:var(--accent);}
  textarea{min-height:72px;}

  .dir{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .dir button{
    flex:1;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-soft);
    padding:9px;border-radius:11px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;
  }
  .dir .swap{flex:0 0 auto;width:42px;font-size:18px;color:var(--accent);background:transparent;border:none;}
  .dir button.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:var(--accent);color:var(--accent-ink);border:none;border-radius:13px;
    padding:14px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px;
  }
  .btn:active{transform:translateY(1px);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn:disabled{opacity:.5;}

  .result{margin-top:14px;}
  .result .out{
    background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:14px;
    font-size:19px;min-height:52px;line-height:1.4;
  }
  .result .out.empty{color:var(--ink-faint);font-style:italic;font-size:15px;}

  /* Word list */
  .listhead{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 12px;}
  .listhead h2{font-family:'Fraunces',serif;font-weight:600;font-size:21px;margin:0;}
  .stats{display:flex;gap:8px;margin-bottom:14px;}
  .stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px;text-align:center;}
  .stat b{display:block;font-family:'Fraunces',serif;font-size:24px;line-height:1;}
  .stat small{font-size:11px;color:var(--ink-soft);letter-spacing:.3px;}
  .s-learn b{color:var(--c-learn);} .s-almost b{color:var(--c-almost);} .s-known b{color:var(--c-known);}

  .item{
    background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px;
    display:flex;align-items:center;gap:12px;margin-bottom:9px;
  }
  .item .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .item .txt{flex:1;min-width:0;}
  .item .en{font-size:16px;font-weight:600;}
  .item .cs{font-size:14px;color:var(--ink-soft);}
  .item .del{background:transparent;border:none;color:var(--ink-faint);font-size:19px;cursor:pointer;padding:4px 6px;}
  .empty-note{text-align:center;color:var(--ink-faint);padding:40px 10px;font-size:15px;line-height:1.5;}

  /* Flashcards */
  .flash{
    background:var(--surface);border:1px solid var(--line);border-radius:22px;
    min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:28px 22px;text-align:center;cursor:pointer;position:relative;box-shadow:var(--shadow);
  }
  .flash .side-label{position:absolute;top:14px;left:0;right:0;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-faint);}
  .flash .word{font-family:'Fraunces',serif;font-size:34px;font-weight:600;line-height:1.15;letter-spacing:-.5px;}
  .flash .hint{margin-top:16px;font-size:13px;color:var(--ink-faint);}
  .flash .badge{position:absolute;top:14px;right:16px;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700;}

  .examples{margin-top:14px;}
  .examples h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);margin:0 0 8px 2px;}
  .ex{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:15px;line-height:1.45;}
  .ex em{color:var(--accent);font-style:normal;font-weight:600;}
  .ex .tr{display:block;color:var(--ink-soft);font-size:13px;margin-top:3px;}
  .ex-loading{color:var(--ink-faint);font-size:14px;font-style:italic;padding:6px 2px;}

  .rate{display:flex;gap:8px;margin-top:16px;}
  .rate button{flex:1;border:none;border-radius:13px;padding:14px 6px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;color:#fff;display:flex;flex-direction:column;gap:3px;align-items:center;}
  .rate small{font-weight:500;opacity:.85;font-size:11px;}
  .r-learn{background:var(--c-learn);} .r-almost{background:var(--c-almost);color:#2a1c00;} .r-known{background:var(--c-known);}

  .progress{text-align:center;color:var(--ink-soft);font-size:13px;margin-bottom:14px;}

  /* Bottom nav */
  nav{
    position:fixed;bottom:0;left:0;right:0;background:rgba(20,17,15,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom));
    z-index:10;
  }
  nav button{
    flex:1;background:transparent;border:none;color:var(--ink-faint);font-family:inherit;
    font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;
  }
  nav button .ic{font-size:21px;line-height:1;}
  nav button.on{color:var(--accent);}

  .hidden{display:none !important;}
  .toast{
    position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--bg);padding:11px 20px;border-radius:30px;font-weight:600;font-size:14px;
    opacity:0;transition:.25s;pointer-events:none;z-index:20;box-shadow:var(--shadow);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.25);border-top-color:var(--accent-ink);border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<header>
  <h1>Slov<span>í</span>čka EN</h1>
  <span class="tag">EN · CS</span>
</header>

<div class="wrap">

  <!-- ============ TRANSLATOR ============ -->
  <section id="view-translate">
    <div class="panel">
      <div class="dir">
        <button id="dirA" class="on" onclick="setDir('cs','en')">Čeština</button>
        <button class="swap" onclick="swapDir()">⇄</button>
        <button id="dirB" onclick="setDir('en','cs')">Angličtina</button>
      </div>
      <label class="fld" id="srcLabel">Zadej text v češtině</label>
      <textarea id="src" placeholder="napiš slovíčko nebo frázi…"></textarea>
      <button class="btn" id="goBtn" onclick="translateNow()">Přeložit</button>
      <div class="result">
        <label class="fld" id="outLabel">Překlad</label>
        <div class="out empty" id="out">Sem se zobrazí překlad…</div>
        <button class="btn ghost" id="saveBtn" onclick="saveCurrent()" disabled>＋ Uložit k učení</button>
      </div>
    </div>
  </section>

  <!-- ============ WORD LIST ============ -->
  <section id="view-list" class="hidden">
    <div class="stats">
      <div class="stat s-learn"><b id="stLearn">0</b><small>učím se</small></div>
      <div class="stat s-almost"><b id="stAlmost">0</b><small>skoro</small></div>
      <div class="stat s-known"><b id="stKnown">0</b><small>umím</small></div>
    </div>
    <div class="listhead">
      <h2>Moje slovíčka</h2>
      <span class="tag" id="totalCount">0</span>
    </div>
    <div id="wordList"></div>
  </section>

  <!-- ============ LEARNING ============ -->
  <section id="view-learn" class="hidden">
    <div id="learnEmpty" class="empty-note hidden">
      Zatím nemáš co se učit.<br>Přidej si slovíčka v překladači.
    </div>
    <div id="learnArea" class="hidden">
      <div class="progress" id="learnProgress"></div>
      <div class="flash" id="flash" onclick="flipCard()">
        <span class="badge" id="cardBadge"></span>
        <span class="side-label" id="cardSide"></span>
        <span class="word" id="cardWord"></span>
        <span class="hint" id="cardHint">ťukni pro otočení</span>
      </div>
      <div id="exampleBox" class="examples hidden">
        <h3>Fráze s tímto slovem</h3>
        <div id="examples"></div>
      </div>
      <div class="rate hidden" id="rateRow">
        <button class="r-learn" onclick="rate(1)">Neumím<small>učím se</small></button>
        <button class="r-almost" onclick="rate(2)">Skoro<small>skoro</small></button>
        <button class="r-known" onclick="rate(3)">Umím<small>hotovo</small></button>
      </div>
    </div>
    <div id="learnDone" class="empty-note hidden">
      Hotovo! 🎉<br>Pro dnešek jsi vše prošel.
      <button class="btn ghost" style="max-width:240px;margin:18px auto 0;" onclick="startLearn()">Projít znovu</button>
    </div>
  </section>

</div>

<nav>
  <button id="nav-translate" class="on" onclick="show('translate')"><span class="ic">⇆</span>Překladač</button>
  <button id="nav-list" onclick="show('list')"><span class="ic">☰</span>Slovíčka</button>
  <button id="nav-learn" onclick="show('learn')"><span class="ic">◧</span>Učení</button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* ---------- Storage ---------- */
const KEY='slovicka_v1';
let words=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(words));}

/* ---------- Toast ---------- */
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1800);}

/* ---------- Direction ---------- */
let from='cs',to='en';
const LANGNAME={cs:'češtině',en:'angličtině'};
function setDir(f,t){from=f;to=t;document.getElementById('dirA').classList.toggle('on',f==='cs');document.getElementById('dirB').classList.toggle('on',f==='en');refreshLabels();}
function swapDir(){setDir(to,from);const s=document.getElementById('src');s.value=current?current.target:s.value;}
function refreshLabels(){
  document.getElementById('srcLabel').textContent='Zadej text v '+LANGNAME[from];
  document.getElementById('outLabel').textContent='Překlad do '+LANGNAME[to];
}

/* ---------- Translate engine: Google Translate (free gtx) only ---------- */
let current=null; // {source,target,from,to}

// Shared helper: returns translated text or throws. Google Translate only.
async function translateText(text,src,tgt){
  const u='https://translate.googleapis.com/translate_a/single?client=gtx&sl='+src+'&tl='+tgt+'&dt=t&q='+encodeURIComponent(text);
  const r=await fetch(u);
  if(!r.ok) throw new Error('http '+r.status);
  const d=await r.json();
  if(Array.isArray(d)&&Array.isArray(d[0])){
    const out=d[0].map(seg=>seg&&seg[0]?seg[0]:'').join('').trim();
    if(out) return out;
  }
  throw new Error('no result');
}

async function translateNow(){
  const text=document.getElementById('src').value.trim();
  if(!text){toast('Napiš nejdřív text');return;}
  const btn=document.getElementById('goBtn');
  const out=document.getElementById('out');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Překládám…';
  out.classList.add('empty');out.textContent='…';
  try{
    const t=await translateText(text,from,to);
    out.classList.remove('empty');
    out.textContent=t;
    current={source:text,target:t,from,to};
    document.getElementById('saveBtn').disabled=false;
  }catch(e){
    out.classList.add('empty');
    out.textContent='Překlad se nepovedl (zkontroluj připojení).';
    current=null;document.getElementById('saveBtn').disabled=true;
  }finally{
    btn.disabled=false;btn.textContent='Přeložit';
  }
}

/* ---------- Save word ---------- */
function saveCurrent(){
  if(!current)return;
  // store always as EN<->CS pair regardless of direction
  let en,cs;
  if(current.from==='en'){en=current.source;cs=current.target;}
  else{en=current.target;cs=current.source;}
  en=en.trim();cs=cs.trim();
  if(words.some(w=>w.en.toLowerCase()===en.toLowerCase())){toast('Už uloženo');return;}
  words.unshift({id:Date.now(),en,cs,box:1,added:Date.now()});
  save();renderList();
  toast('Uloženo ✓');
}

/* ---------- Word list ---------- */
const BOXNAME={1:'učím se',2:'skoro',3:'umím'};
const BOXVAR={1:'var(--c-learn)',2:'var(--c-almost)',3:'var(--c-known)'};
function renderList(){
  const c={1:0,2:0,3:0};words.forEach(w=>c[w.box]++);
  document.getElementById('stLearn').textContent=c[1];
  document.getElementById('stAlmost').textContent=c[2];
  document.getElementById('stKnown').textContent=c[3];
  document.getElementById('totalCount').textContent=words.length;
  const list=document.getElementById('wordList');
  if(!words.length){list.innerHTML='<div class="empty-note">Žádná slovíčka.<br>Přelož něco a ulož si to.</div>';return;}
  list.innerHTML=words.map(w=>`
    <div class="item">
      <span class="dot" style="background:${BOXVAR[w.box]}"></span>
      <div class="txt">
        <div class="en">${esc(w.en)}</div>
        <div class="cs">${esc(w.cs)}</div>
      </div>
      <button class="del" onclick="delWord(${w.id})">✕</button>
    </div>`).join('');
}
function delWord(id){words=words.filter(w=>w.id!==id);save();renderList();}
function esc(s){return s.replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

/* ---------- Learning (Leitner-ish, prioritise lower boxes) ---------- */
let queue=[],qi=0,flipped=false;
function startLearn(){
  queue=[...words].sort((a,b)=>a.box-b.box||Math.random()-0.5);
  qi=0;
  document.getElementById('learnEmpty').classList.toggle('hidden',words.length>0);
  document.getElementById('learnArea').classList.toggle('hidden',words.length===0);
  document.getElementById('learnDone').classList.add('hidden');
  if(words.length) showCard();
}
function showCard(){
  if(qi>=queue.length){finishLearn();return;}
  flipped=false;
  const w=queue[qi];
  document.getElementById('learnProgress').textContent=`Kartička ${qi+1} z ${queue.length}`;
  document.getElementById('cardSide').textContent='Anglicky';
  document.getElementById('cardWord').textContent=w.en;
  document.getElementById('cardHint').classList.remove('hidden');
  const badge=document.getElementById('cardBadge');
  badge.textContent=BOXNAME[w.box];badge.style.background=BOXVAR[w.box];
  badge.style.color=w.box===2?'#2a1c00':'#fff';
  document.getElementById('rateRow').classList.add('hidden');
  document.getElementById('exampleBox').classList.add('hidden');
  document.getElementById('examples').innerHTML='';
}
function flipCard(){
  if(qi>=queue.length)return;
  const w=queue[qi];
  if(!flipped){
    flipped=true;
    document.getElementById('cardSide').textContent='Česky';
    document.getElementById('cardWord').textContent=w.cs;
    document.getElementById('cardHint').classList.add('hidden');
    document.getElementById('rateRow').classList.remove('hidden');
    loadExamples(w.en);
  }else{
    // flip back
    document.getElementById('cardSide').textContent='Anglicky';
    document.getElementById('cardWord').textContent=w.en;
    flipped=false;
  }
}
function rate(box){
  const w=queue[qi];
  const real=words.find(x=>x.id===w.id);
  if(real)real.box=box;
  save();
  qi++;showCard();
}
function finishLearn(){
  document.getElementById('learnArea').classList.add('hidden');
  document.getElementById('learnDone').classList.remove('hidden');
  renderList();
}

/* ---------- Example phrases (Free Dictionary API for EN words) ---------- */
async function loadExamples(word){
  const box=document.getElementById('exampleBox');
  const cont=document.getElementById('examples');
  box.classList.remove('hidden');
  cont.innerHTML='<div class="ex-loading">Hledám fráze…</div>';
  const single=word.trim().split(/\s+/).length===1;
  try{
    if(!single)throw new Error('phrase');
    const r=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word.toLowerCase()));
    if(!r.ok)throw new Error('not found');
    const d=await r.json();
    const ex=[];
    d.forEach(entry=>(entry.meanings||[]).forEach(m=>(m.definitions||[]).forEach(def=>{
      if(def.example) ex.push(def.example);
    })));
    const uniq=[...new Set(ex)].slice(0,4);
    if(!uniq.length)throw new Error('no examples');
    // translate each example to CS
    cont.innerHTML='';
    for(const sentence of uniq){
      const id='ex'+Math.random().toString(36).slice(2);
      const hl=esc(sentence).replace(new RegExp('('+word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<em>$1</em>');
      cont.innerHTML+=`<div class="ex">${hl}<span class="tr" id="${id}">…</span></div>`;
      translateExample(sentence,id);
    }
  }catch(e){
    cont.innerHTML='<div class="ex-loading">Pro toto slovo se nenašly ukázkové fráze.</div>';
  }
}
async function translateExample(sentence,id){
  try{
    const t=await translateText(sentence,'en','cs');
    const el=document.getElementById(id);if(el)el.textContent=t||'';
  }catch(e){const el=document.getElementById(id);if(el)el.textContent='';}
}

/* ---------- View switching ---------- */
function show(v){
  ['translate','list','learn'].forEach(x=>{
    document.getElementById('view-'+x).classList.toggle('hidden',x!==v);
    document.getElementById('nav-'+x).classList.toggle('on',x===v);
  });
  if(v==='list')renderList();
  if(v==='learn')startLearn();
}

/* ---------- init ---------- */
refreshLabels();renderList();
document.getElementById('src').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();translateNow();}});
</script>
</body>
</html>
